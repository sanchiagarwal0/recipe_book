<!DOCTYPE html>
<html>
<head>

<title>Past Orders</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
}

.container{
width:70%;
margin:auto;
margin-top:60px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#ff7043;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #eee;
}

tr:hover{
background:#fafafa;
}

.total{
text-align:right;
font-size:20px;
margin-top:20px;
}

.back{
display:inline-block;
margin-top:20px;
background:#42a5f5;
color:white;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
}

.empty{
text-align:center;
font-size:20px;
padding:40px;
}

</style>

</head>

<body>

<div class="container">

<h1>📦 Past Orders</h1>

{% if orders %}

<table>

<tr>
<th>Item</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
</tr>

{% for order in orders %}

<tr>

<td>{{ order.item }}</td>

<td>₹{{ order.price }}</td>

<td>{{ order.qty }}</td>

<td>₹{{ order.price * order.qty }}</td>

</tr>

{% endfor %}

</table>

<a href="/index" class="back">⬅ Continue Shopping</a>

{% else %}

<div class="empty">
📦 No past orders yet
</div>

{% endif %}

</div>

</body>
</html>
