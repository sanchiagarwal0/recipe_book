<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f6fb;
margin:0;
}

/* Header */

.header{
background:linear-gradient(135deg,#ff7e5f,#ff9966);
padding:20px;
color:white;
text-align:center;
font-size:24px;
font-weight:600;
}

/* Container */

.container{
width:80%;
max-width:900px;
margin:40px auto;
}

/* Profile Card */

.profile-card{
background:white;
border-radius:15px;
padding:30px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
margin-bottom:30px;
}

/* Profile Header */

.profile-header{
display:flex;
align-items:center;
gap:20px;
margin-bottom:25px;
}

.profile-img{
width:90px;
height:90px;
border-radius:50%;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
color:#555;
}

.profile-name{
font-size:22px;
font-weight:600;
}

.profile-email{
color:#777;
font-size:14px;
}

/* Form */

.form-group{
margin-bottom:18px;
}

label{
display:block;
font-size:14px;
margin-bottom:5px;
color:#555;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

input:focus{
outline:none;
border-color:#ff7e5f;
}

/* Buttons */

.btn{
background:#ff7e5f;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.btn:hover{
background:#ff5a3d;
}

/* Password Section */

.password-box{
margin-top:20px;
border-top:1px solid #eee;
padding-top:20px;
}

</style>

</head>

<body>

<div class="header">
My Account
</div>

<div class="container">

<!-- PROFILE INFO -->

<div class="profile-card">

<div class="profile-header">

<div class="profile-img">
👤
</div>

<div>
<div class="profile-name">Sanchi Agarwal</div>
<div class="profile-email">sanchi@email.com</div>
</div>

</div>

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text" value="Sanchi Agarwal">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" value="sanchi@email.com">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" placeholder="Enter phone number">
</div>

<div class="form-group">
<label>Address</label>
<input type="text" placeholder="Enter delivery address">
</div>

<button class="btn">Save Changes</button>

</form>

</div>

<!-- CHANGE PASSWORD -->

<div class="profile-card">

<h3>Security Settings</h3>

<form class="password-box">

<div class="form-group">
<label>Current Password</label>
<input type="password">
</div>

<div class="form-group">
<label>New Password</label>
<input type="password">
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password">
</div>

<button class="btn">Update Password</button>

</form>

</div>

</div>

</body>
</html>
