<!DOCTYPE html>
<html>
<head>
<title>Order Receipt</title>

<style>

body{
    font-family: Arial;
    background:#f2f4f8;
    padding:40px;
}

.bill-box{
    width:650px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

.details{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th{
    background:#fafafa;
}

.summary{
    margin-top:20px;
    text-align:right;
    font-size:18px;
}

.buttons{
    text-align:center;
    margin-top:30px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin:10px;
}

.print{
    background:#2ecc71;
    color:white;
}

.pdf{
    background:#3498db;
    color:white;
}

.shop{
    background:black;
    color:white;
}

</style>

<script>
function printReceipt(){
    window.print();
}
</script>

</head>

<body>

<div class="bill-box">

<h1>🧾 Order Receipt</h1>

<div class="details">
<div><b>Date:</b> {{date}}</div>
<div><b>Time:</b> {{time}}</div>
</div>

<table>

<tr>
<th>Item</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>

{% for item in items %}

<tr>
<td>{{item.name}}</td>
<td>₹{{item.price}}</td>
<td>{{item.qty}}</td>
<td>₹{{item.subtotal}}</td>
</tr>

{% endfor %}

</table>

<div class="summary">
<p>Subtotal: ₹{{subtotal}}</p>
<p>GST (18%): ₹{{gst}}</p>
<h3>Grand Total: ₹{{total}}</h3>
</div>

<div class="buttons">

<button class="print" onclick="printReceipt()">
Print Receipt
</button>


<a href="/">
<button class="shop">
Continue Shopping
</button>
</a>

</div>

</div>

</body>
</html>
